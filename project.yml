name: Stash
options:
  bundleIdPrefix: com.stash
  deploymentTarget:
    iOS: "15.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Stash:
    type: application
    platform: iOS
    sources:
      - path: Stash
    info:
      path: Stash/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stash.app
        INFOPLIST_FILE: Stash/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
